name: Docker CI/CD - Automatic Deploy

# Este workflow é acionado quando uma tag seguindo o padrão 'v*.*.*' é criada (ex: v1.0.0).
# Fluxo: Build da imagem Docker → Push para ECR → Deploy na EC2 via SSM
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write   # Necessário para autenticação OIDC com a AWS
  contents: read    # Necessário para o actions/checkout clonar o repositório

# Variáveis globais reutilizadas em ambos os jobs
# Centralizar aqui evita hardcode e facilita manutenção
env:
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: 538073092645
  ECR_REPOSITORY: infra-dev-site_estatico-ecr
  EC2_NAME: infra-dev-site-estatico-ec2
  CONTAINER_NAME: site_estatico

jobs:

  Build_ECR:
    runs-on: ubuntu-latest
    # Expõe a image_tag para o job Deploy_image_EC2
    # Necessário pois jobs são isolados entre si no GitHub Actions
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0  # Clona o repositório no runner

      # Calcula a tag uma única vez para garantir consistência entre os jobs
      # Formato: v1.0.0-a3f1c2d (ref_name + 7 primeiros caracteres do SHA)
      - name: Set Image Tag
        id: set_tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image_tag=${{ github.ref_name }}-$SHORT_SHA" >> $GITHUB_OUTPUT

      # Autentica na AWS via OIDC — sem necessidade de chaves de acesso estáticas
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github_infra_docker_role
          aws-region: ${{ env.AWS_REGION }}
      
      # Realiza login no ECR e expõe o registry URL via outputs (steps.login-ecr.outputs.registry)
      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set_tag.outputs.image_tag }}
        run: |
          # Constrói a imagem localmente com a tag versionada
          docker build -t ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .

          # Adiciona o prefixo do registry ECR para que o push vá ao destino correto
          docker tag ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

          # Envia a imagem para o ECR — a lifecycle policy do repositório mantém apenas as últimas 5 imagens
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

  # Só executa após o Build_ECR concluir com sucesso
  # Recebe a image_tag gerada no job anterior via needs.Build_ECR.outputs.image_tag
  Deploy_image_EC2:
    needs: Build_ECR
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github_infra_docker_role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Docker Image na EC2 via SSM
        env:
          IMAGE_TAG: ${{ needs.Build_ECR.outputs.image_tag }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.EC2_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          ECR_IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          # Monta o JSON em uma variável separada para evitar conflito de aspas
          COMMANDS=$(cat <<EOF
          {
            "commands": [
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
              "docker pull ${ECR_IMAGE}",
              "docker stop ${{ env.CONTAINER_NAME }} || true",
              "docker rm ${{ env.CONTAINER_NAME }} || true",
              "docker run -d --name ${{ env.CONTAINER_NAME }} -p 80:80 ${ECR_IMAGE}"
            ]
          }
          EOF
          )

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS"